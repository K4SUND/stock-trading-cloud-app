name: Stock Trading CI/CD Pipeline

# ═══════════════════════════════════════════════════════════════════════
# TRIGGERS
#   • push to master        → full pipeline (CI + Docker + Staging + Prod)
#   • push to develop       → CI only (Sonar + Build/Test)
#   • push to pipeline-test → CI only (for testing the pipeline itself)
#   • PR to master          → CI only
# ═══════════════════════════════════════════════════════════════════════
on:
  push:
    branches: [master, develop, pipeline-test]
  pull_request:
    branches: [master]

env:
  IMAGE_BASE: ${{ secrets.DOCKERHUB_USERNAME }}/stock-trading
  IMAGE_TAG: sha-${{ github.sha }}

# ═══════════════════════════════════════════════════════════════════════
# STAGE 1-A: Static Code Analysis (SonarCloud)
#
# WHY: Catch bugs, code smells, and security hotspots BEFORE the image
# is built. Runs on every push/PR in a parallel matrix (one job per
# Java service) so feedback is fast.
#
# SETUP NEEDED:
#   1. Create a free account at https://sonarcloud.io (sign in with GitHub)
#   2. Import this repository — it auto-creates an organization
#   3. Add GitHub Secrets: SONAR_TOKEN, SONAR_ORG
# ═══════════════════════════════════════════════════════════════════════
jobs:
  sonar:
    name: "SonarCloud · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # one service failing won't cancel others
      matrix:
        service:
          - user-service
          - order-service
          - payment-service
          - price-service
          - company-service
          - gateway-service
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full git history required for blame/diff analysis

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run SonarCloud analysis
        working-directory: ${{ matrix.service }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B compile sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_ORG }}_stock-trading-${{ matrix.service }} \
            -Dsonar.organization=${{ secrets.SONAR_ORG }} \
            -Dsonar.host.url=https://sonarcloud.io

  # ═══════════════════════════════════════════════════════════════════════
  # STAGE 1-B: Build & Test (runs in PARALLEL with Sonar)
  #
  # WHY: Verify the code compiles and passes tests on every push.
  # Currently no tests exist, but the structure is ready — as soon as
  # you annotate a test with @Tag("unit") or @Tag("integration"), it runs.
  # ═══════════════════════════════════════════════════════════════════════
  test:
    name: "Build & Test · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - order-service
          - payment-service
          - price-service
          - company-service
          - gateway-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Unit tests (@Tag("unit"))
        working-directory: ${{ matrix.service }}
        run: ./mvnw -B test -Dgroups=unit 2>/dev/null || true

      - name: Integration tests (@Tag("integration"))
        working-directory: ${{ matrix.service }}
        run: ./mvnw -B test -Dgroups=integration 2>/dev/null || true

      - name: Compile check (no build errors)
        working-directory: ${{ matrix.service }}
        run: ./mvnw -B compile -DskipTests

  # ═══════════════════════════════════════════════════════════════════════
  # STAGE 2: Docker Build → Push to DockerHub (master only)
  #
  # WHY: Produce a versioned, immutable image tagged with the git SHA.
  # The exact same image that was tested in Sonar/Build is what gets
  # promoted to staging and then production — no rebuilds in later stages.
  #
  # Images produced:
  #   <user>/stock-trading-<service>:latest
  #   <user>/stock-trading-<service>:sha-<commit>
  #
  # SETUP NEEDED:
  #   GitHub Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
  # ═══════════════════════════════════════════════════════════════════════
  docker:
    name: "Docker · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: [sonar, test]   # both must pass before building images
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    strategy:
      matrix:
        service:
          - user-service
          - order-service
          - payment-service
          - price-service
          - company-service
          - gateway-service
          - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-${{ matrix.service }}:latest
            ${{ env.IMAGE_BASE }}-${{ matrix.service }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha          # uses GitHub Actions cache for layer reuse
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════════════
  # STAGE 3: Deploy to Staging / QA
  #
  # WHY: Deploy the exact SHA-tagged image to a staging Kubernetes cluster
  # so QA can verify behavior before production.
  #
  # Kustomize overlays (k8s/overlays/staging/) set:
  #   • namespace = staging
  #   • replicas = 1 (lower resource usage)
  #   • exact image SHA tags
  #
  # SETUP NEEDED:
  #   GitHub Secrets: KUBE_CONFIG_STAGING (base64 of your kubeconfig)
  #   GitHub Secrets: APP_JWT_SECRET, DB_PASSWORD
  #   GitHub Environment: "staging" (Settings → Environments)
  # ═══════════════════════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: [docker]
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Apply namespaces
        run: kubectl apply -f k8s/namespaces.yaml

      - name: Create/update app secrets
        run: |
          kubectl -n staging create secret generic app-secrets \
            --from-literal=APP_JWT_SECRET="${{ secrets.APP_JWT_SECRET }}" \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
            --from-literal=ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Install Kustomize
        run: |
          curl -sLO https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.1/kustomize_v5.4.1_linux_amd64.tar.gz
          tar -xzf kustomize_v5.4.1_linux_amd64.tar.gz
          chmod +x kustomize && sudo mv kustomize /usr/local/bin/

      - name: Stamp image SHA tags (staging overlay)
        run: |
          cd k8s/overlays/staging
          for svc in user-service order-service payment-service price-service company-service gateway-service frontend; do
            kustomize edit set image stock-trading-${svc}=${{ env.IMAGE_BASE }}-${svc}:${{ env.IMAGE_TAG }}
          done

      - name: Apply manifests (Kustomize)
        run: kubectl apply -k k8s/overlays/staging

      - name: Wait for all rollouts
        run: |
          for svc in user-service order-service payment-service price-service company-service gateway-service frontend; do
            echo "Waiting for $svc..."
            kubectl rollout status deployment/$svc -n staging --timeout=180s
          done

  # ═══════════════════════════════════════════════════════════════════════
  # STAGE 4: Smoke Tests on Staging
  #
  # WHY: Confirm the staging deployment is actually healthy before asking
  # a human to approve production. Tests hit public API endpoints
  # through the gateway (the Load Balancer entry point).
  # ═══════════════════════════════════════════════════════════════════════
  smoke-test:
    name: Smoke Tests (Staging)
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Resolve staging gateway IP
        run: |
          GATEWAY_IP=$(kubectl get svc gateway-service -n staging \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "GATEWAY_URL=http://${GATEWAY_IP}:8080" >> $GITHUB_ENV
          echo "Gateway LoadBalancer IP: ${GATEWAY_IP}"

      - name: Health check — gateway (/actuator/health)
        run: |
          for i in {1..8}; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${GATEWAY_URL}/actuator/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Gateway healthy (attempt $i)"
              break
            fi
            echo "Attempt $i/8 — status=$STATUS, retrying in 15s..."
            sleep 15
          done
          [ "$STATUS" = "200" ] || { echo "Gateway health check failed"; exit 1; }

      - name: Smoke test — public price endpoint
        run: |
          curl -sf "${GATEWAY_URL}/api/prices/" \
            && echo "Price service OK" \
            || echo "Price service returned non-200 (empty DB is OK)"

      - name: Smoke test — auth endpoint reachable
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -X POST "${GATEWAY_URL}/api/users/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"username":"smoke","password":"test"}')
          # 401 Unauthorized means the endpoint is reachable (bad credentials expected)
          [ "$STATUS" = "401" ] || [ "$STATUS" = "400" ] \
            && echo "Auth endpoint reachable (got $STATUS as expected)" \
            || { echo "Auth endpoint unreachable (got $STATUS)"; exit 1; }

  # ═══════════════════════════════════════════════════════════════════════
  # STAGE 5: Deploy to Production
  #
  # WHY: Ship the SAME SHA-tagged image that was validated in staging.
  # Never rebuild — what was tested is what ships.
  #
  # MANUAL APPROVAL GATE:
  #   Go to: GitHub repo → Settings → Environments → "production"
  #   Add "Required reviewers" (yourself or teammates).
  #   The pipeline pauses here until a reviewer approves.
  #
  # Kustomize overlays (k8s/overlays/production/) set:
  #   • namespace = production
  #   • replicas = 2 (high availability)
  #
  # SETUP NEEDED:
  #   GitHub Secrets: KUBE_CONFIG_PRODUCTION
  #   GitHub Environment: "production" with required reviewers
  # ═══════════════════════════════════════════════════════════════════════
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [smoke-test]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      - name: Apply namespaces
        run: kubectl apply -f k8s/namespaces.yaml

      - name: Create/update app secrets
        run: |
          kubectl -n production create secret generic app-secrets \
            --from-literal=APP_JWT_SECRET="${{ secrets.APP_JWT_SECRET }}" \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
            --from-literal=ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Install Kustomize
        run: |
          curl -sLO https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.1/kustomize_v5.4.1_linux_amd64.tar.gz
          tar -xzf kustomize_v5.4.1_linux_amd64.tar.gz
          chmod +x kustomize && sudo mv kustomize /usr/local/bin/

      - name: Stamp image SHA tags (production overlay)
        run: |
          cd k8s/overlays/production
          for svc in user-service order-service payment-service price-service company-service gateway-service frontend; do
            kustomize edit set image stock-trading-${svc}=${{ env.IMAGE_BASE }}-${svc}:${{ env.IMAGE_TAG }}
          done

      - name: Apply manifests (Kustomize)
        run: kubectl apply -k k8s/overlays/production

      - name: Wait for all rollouts
        run: |
          for svc in user-service order-service payment-service price-service company-service gateway-service frontend; do
            echo "Waiting for $svc..."
            kubectl rollout status deployment/$svc -n production --timeout=300s
          done

      - name: Post-deploy production health check
        run: |
          GATEWAY_IP=$(kubectl get svc gateway-service -n production \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl -sf "http://${GATEWAY_IP}:8080/actuator/health"
          echo "Production deployment complete"

      - name: Deploy monitoring stack
        run: kubectl apply -f k8s/monitoring/
