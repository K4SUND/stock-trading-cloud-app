services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  user-service:
    build: ../user-service
    depends_on:
      - postgres
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/usersdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_JWT_SECRET: change-this-secret-key-change-this-secret-key
      APP_INTERNAL_SERVICE_SECRET: dev-internal-service-secret
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: Admin@StockTrade2024
    ports:
      - "8081:8081"

  order-service:
    build: ../order-service
    depends_on:
      - postgres
      - kafka
      - payment-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ordersdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_JWT_SECRET: change-this-secret-key-change-this-secret-key
      PAYMENT_SERVICE_URL: http://payment-service:8083
    ports:
      - "8082:8082"

  payment-service:
    build: ../payment-service
    depends_on:
      - postgres
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/paymentsdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_JWT_SECRET: change-this-secret-key-change-this-secret-key
      APP_INTERNAL_SERVICE_SECRET: dev-internal-service-secret
      USER_SERVICE_URL: http://user-service:8081
    ports:
      - "8083:8083"

  price-service:
    build: ../price-service
    depends_on:
      - postgres
      - kafka
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pricesdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
    ports:
      - "8084:8084"

  company-service:
    build: ../company-service
    depends_on:
      - postgres
      - kafka
      - price-service
      - order-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/companydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_JWT_SECRET: change-this-secret-key-change-this-secret-key
      PRICE_SERVICE_URL: http://price-service:8084
      ORDER_SERVICE_URL: http://order-service:8082
    ports:
      - "8085:8085"

  matching-engine-service:
    build: ../matching-engine-service
    depends_on:
      - kafka
      - order-service
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ORDER_SERVICE_URL: http://order-service:8082
    ports:
      - "8086:8086"

  notification-service:
    build: ../notification-service
    depends_on:
      - mongodb
      - kafka
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/notificationsdb
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_JWT_SECRET: change-this-secret-key-change-this-secret-key
    ports:
      - "8087:8087"

  gateway-service:
    build: ../gateway-service
    depends_on:
      - user-service
      - order-service
      - payment-service
      - price-service
      - company-service
      - matching-engine-service
      - notification-service
    environment:
      USER_SERVICE_URL:             http://user-service:8081
      ORDER_SERVICE_URL:            http://order-service:8082
      PAYMENT_SERVICE_URL:          http://payment-service:8083
      PRICE_SERVICE_URL:            http://price-service:8084
      COMPANY_SERVICE_URL:          http://company-service:8085
      MATCHING_ENGINE_SERVICE_URL:  http://matching-engine-service:8086
      NOTIFICATION_SERVICE_URL:     http://notification-service:8087
      APP_JWT_SECRET: change-this-secret-key-change-this-secret-key
    ports:
      - "8080:8080"

  frontend:
    build: ../frontend
    depends_on:
      - gateway-service
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  mongodb_data:
