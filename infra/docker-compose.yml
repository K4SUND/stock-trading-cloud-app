services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  user-service:
    build: ../user-service
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/usersdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_JWT_SECRET: change-this-secret-key-change-this-secret-key
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: Admin@StockTrade2024
    ports:
      - "8081:8081"

  order-service:
    build: ../order-service
    depends_on:
      - postgres
      - rabbitmq
      - payment-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ordersdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      APP_JWT_SECRET: change-this-secret-key-change-this-secret-key
      PAYMENT_SERVICE_URL: http://payment-service:8083
    ports:
      - "8082:8082"

  payment-service:
    build: ../payment-service
    depends_on:
      - postgres
      - rabbitmq
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/paymentsdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      APP_JWT_SECRET: change-this-secret-key-change-this-secret-key
    ports:
      - "8083:8083"

  price-service:
    build: ../price-service
    depends_on:
      - postgres
      - rabbitmq
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pricesdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATA_REDIS_HOST: redis
    ports:
      - "8084:8084"

  company-service:
    build: ../company-service
    depends_on:
      - postgres
      - rabbitmq
      - price-service
      - order-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/companydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      APP_JWT_SECRET: change-this-secret-key-change-this-secret-key
      PRICE_SERVICE_URL: http://price-service:8084
      ORDER_SERVICE_URL: http://order-service:8082
    ports:
      - "8085:8085"

  matching-engine-service:
    build: ../matching-engine-service
    depends_on:
      - rabbitmq
      - order-service
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      ORDER_SERVICE_URL: http://order-service:8082
    ports:
      - "8086:8086"

  notification-service:
    build: ../notification-service
    depends_on:
      - mongodb
      - rabbitmq
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/notificationsdb
      SPRING_RABBITMQ_HOST: rabbitmq
      APP_JWT_SECRET: change-this-secret-key-change-this-secret-key
    ports:
      - "8087:8087"

  gateway-service:
    build: ../gateway-service
    depends_on:
      - user-service
      - order-service
      - payment-service
      - price-service
      - company-service
      - matching-engine-service
      - notification-service
    environment:
      USER_SERVICE_URL:             http://user-service:8081
      ORDER_SERVICE_URL:            http://order-service:8082
      PAYMENT_SERVICE_URL:          http://payment-service:8083
      PRICE_SERVICE_URL:            http://price-service:8084
      COMPANY_SERVICE_URL:          http://company-service:8085
      MATCHING_ENGINE_SERVICE_URL:  http://matching-engine-service:8086
      NOTIFICATION_SERVICE_URL:     http://notification-service:8087
      APP_JWT_SECRET: change-this-secret-key-change-this-secret-key
    ports:
      - "8080:8080"

  frontend:
    build: ../frontend
    depends_on:
      - gateway-service
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  mongodb_data:
